        <style>
            *{
                margin:0px;
                padding:0px;
                box-sizing:border-box;
            }
            .header{
               
                height:10vh;
                display:flex;
                justify-content:left;
                gap:20px;
                padding-top: 20px;
            }
            .main{
               
                height:90vh;
                display: grid;
                grid-template-columns: 1fr 15fr;
            }
            
            .utubelogo img{
                height:30px;
                width: 60px;
                
            
            }
            .search{
                border:1px solid black;
                height:30px;
                width: 500px;
                margin-left: 400px;
                border-radius: 50px;
            }
            .search input{
                border:none;
                margin-left: 10px;
                
            }
            .create{
                border: 1px solid rgb(193, 188, 188);
                position: relative;
                left:200px;
                bottom:7px;
                display: flex;
                justify-content: center;
                width:100px;
                height: 40px;
                text-align: center;
                padding-top: 10px;
                border-radius: 50px;
                background-color: rgb(174, 170, 170);
            }
            .account p{
                position: relative;
                left:200px;
                top:1px;
                height:40px;
                width:40px;
                text-align: center;
                border-radius: 50px;
                background-color: blue;
                color: white;
            }
            .left{
                
                
                display: flex;
                flex-direction: column;
                gap:20px;
                
            }
            .right{
                
            
            }
            .home{
               
                
            }
            .shorts{
                
            }
            .shorts img{
                height:20px;
            }
            .sub{
                
            }
            .sub img{
                height:40px;
            }
            .uaccount{
                
            }
            .nav{
              
                display:flex;
                justify-content: baseline;
                gap:25px;
            }
            .nav a{
               
                width:60px;
                text-align: center;
                border-radius: 5px;
                text-decoration: none;
                color: white;
                background-color: grey;
            }
            
            .images{
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                margin-top: 20px;
            }
            .images img{
                 width: 100%;
                 height: 180px;
                 border-radius: 10px;
}
