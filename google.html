<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google home
    </title>
     <script src="https://kit.fontawesome.com/819da04ac6.js" crossorigin="anonymous"></script>
     <style>
        .header{
            
            display:flex;
            justify-content: end;
        }
        .content{ 
            padding:20px;
        }
        .content a{
            text-decoration: none;
            color: grey;
        }
        .profile img{
            height:30px;
            margin-top:15px;
            border-radius: 50px;
        }
        .google-pic img{
            height:200px;
            width:300px;
        }
        .google-pic{
           
             display:flex;
             justify-content: center;
        }
        .search{
            width:50%;
            display: flex;
            justify-content: center;
            align-items:center;
            gap:60px;
            margin:auto;
            border-radius:50px; 
            box-shadow: 5px 5px 5px 0px rgb(185, 180, 180); 
        }
        .icon{
         
            margin-right:250px;
        }
        .icon input{
            border:none;
            outline:none;
        }
        .mic{
            
            gap:20%;
            margin-left:30px;
            display:flex;
            justify-content: center;
            align-items: center;
            gap:30px;
        }
        .ai{
            border:1px solid rgb(189, 180, 180);
            display:flex;
            justify-content: center;
            align-items:center;
            margin-top:10px;
            margin-bottom:10px;
            margin-right:10px;
            border-radius:20px;
            box-shadow: 5px 5px 5px 0px rgb(222, 215, 215);
        }
        .sub{
           
            display: flex;
            justify-content: center;
            padding-top: 20px;
            gap:90px;
        }
        .utube{
            border:none;
            width:fit-content;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 50px;
            box-shadow: 5px 5px 5px rgb(167, 167, 167);

        }
        .utube img{
            margin:20px;
            height:50px;
            width:50px;
            padding:10px;
            border-radius: 50px;
        }
        
        .facebook{
             border:none;
            width:fit-content;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 50px;
            box-shadow: 5px 5px 5px rgb(167, 167, 167);
        }
        .facebook img{
            margin:20px;
            height:50px;
            width:50px;
            border-radius: 50px;
        }
        
        .instagram{
              border:none;
            width:fit-content;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 50px;
            box-shadow: 5px 5px 5px rgb(167, 167, 167);
        }
        .instagram img{
            margin:20px;
            height:50px;
            width:50px;
            border-radius: 50px;
        }
       

       
     </style>
</head>
<body>
    <div class="header">
       <div class="content">
         <a href="">Gmail</a>
         <a href="">images</a>
         <i class="fa-solid fa-flask"></i>
         <i class="fa-solid fa-grip"></i>
       </div>
        <div class="profile">
            <img src="https://lh3.googleusercontent.com/ogw/AF2bZyjttLiUjRwXNZOQ7VVkaW3tW6RMMJTemZS2DI-hyCMdig=s64-c-mo">
          
        </div>
    </div>
    <div class="main">
        <div class="google-pic">
            <img src="https://pngimg.com/uploads/google/google_PNG19644.png">
              <i class="fa-solid fa-share-nodes" style="margin-top:150px;margin-left: 20px;"></i>
        </div>
        <div class="search">
            <div class="icon">                                              
                <i class="fa-brands fa-sistrix"></i>
                <input type="text" placeholder="search google or type a url">
            </div>
         <div class="mic">
            <i class="fa-solid fa-microphone" ></i>
            <i class="fa-solid fa-camera-retro" ></i>
        </div>
            <div class="ai">
                <i class="fa-brands fa-sistrix"></i>
                <p>AI Mode</p>
            </div>

        </div>
        
        <div class="sub">
        <div class="utube">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
            
        </div>
        <div class="facebook">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHdxqvC6ycgnQzWZu6i8GgonJZY_5ptmntd3f2txAYuw&s=10">
           
        </div>
        <div class="instagram">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1280px-Instagram_logo_2016.svg.png">
            
        </div>
    </div>
    
</body>
</html>
