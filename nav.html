<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nav</title>
    <script src="https://kit.fontawesome.com/819da04ac6.js" crossorigin="anonymous"></script>
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing:border-box;
        }
        .nav{
            border:1px solid black;
            background-color: blueviolet;
            display:flex;
            justify-content: space-between;
            
        }
        .nav h1{
            color:aliceblue;
        }
        .list{
             display: flex;
             gap:30px;
        }
        .list a{
            text-decoration: none;
            color:aliceblue;
            padding:10px;
            
        }
        .list a:hover{
            font-size: 20px;
            cursor: pointer;
            color:bisque;
        }
        .menubar{
            display:none;
        }
        .list1{
            display:none;
        }
        
        @media(max-width:365px){
            .list a{
                display:none;
            }
            .menubar{
                display:block;
                border:1px solid black;
                margin-left: 155px;
            }
            .list1:checked{
                display:block;
            margin-top:20px;
            width:550px;
            margin-left: 500px;
            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgb(190, 144, 233);
            gap:10px;
            border-radius: 20px;
        }
        .list1 a{
            text-decoration: none;
            color:rgb(55, 57, 58);
            padding:10px;
        }

            }

    </style>
</head>
<body>
    <div class="nav">
        <h1>HELLO!</h1>
         <div class="menubar">
            <i class="fa-solid fa-bars" style="color:aliceblue;margin-top: 10px;font-size: 20px;"></i>
        </div>
        <div class="list">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
            <a href="">Contact us</a>
        </div>
    </div>
    <div class="main">
        <div class="list1">
            <a href="">Home</a>
            <a href="">About</a>
            <a href="">Products</a>
            <a href="">Contact us</a>
        </div>
    </div>
    
</body>
</html>
