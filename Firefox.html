<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefox</title>
    <script src="https://kit.fontawesome.com/819da04ac6.js" crossorigin="anonymous"></script>
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing:border-box;
        }
        .main{
            
            height:90vh;
        }
        .footer{
            
            height:10vh;

        }
        .setting{
            display:flex;
            justify-content: end;
            
            margin-top:20px;
            margin-right:20px;
        }
        .fire{
            margin:50px;
            display:flex;
            justify-content: center;
        }
        .fire img{
            height:200px;
            width:200px;
            
        }
        .fire h1{
           
            padding-top: 80px;
            font-size:80px;
            font-family: Arial, Helvetica, sans-serif;
        }
        .search{
            border:none;
           width:40%;
           padding:20px;
             display:flex;
            justify-content:start;
            margin: auto;
            gap:30px;
            border-radius: 10px;
            box-shadow:5px 5px 5px 5px rgb(171, 170, 170); 
        }
        .search img{
            height:30px;
        }
        .search input{
            outline:none;
            border:none;
            width:80%;
        }
        .sub{
           
            display: flex;
            justify-content: center;
            padding-top: 20px;
            gap:90px;
        }
        .utube{
            border:none;
            width:fit-content;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 5px;
            box-shadow: 5px 5px 5px rgb(167, 167, 167);

        }
        .utube img{
            margin:20px;
            height:50px;
            width:50px;
            padding:10px;
        }
        .utube p{
            text-align: center;
        }
        .facebook{
             border:none;
            width:fit-content;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 5px;
            box-shadow: 5px 5px 5px rgb(167, 167, 167);
        }
        .facebook img{
            margin:20px;
            height:50px;
            width:50px;
        }
        .facebook p{
            text-align: center;
        }
        .instagram{
              border:none;
            width:fit-content;
            display:flex;
            flex-direction: column;
            justify-content: center;
            border-radius: 5px;
            box-shadow: 5px 5px 5px rgb(167, 167, 167);
        }
        .instagram img{
            margin:20px;
            height:50px;
            width:50px;
        }
        .instagram p{
            text-align: center;
        }

    </style>
</head>
<body>
    
    <div class="main">
        <div class=" setting">
            <i class="fa-solid fa-gear"></i>
        </div>
        <div class="fire">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8te0L1QWGqYmF7KLvtXuyHRdwPRMdDKvCROH4cVlA2hUK9h6EtRKDJSs&s=10" alt="logo">
            <h1>Firefox</h1>
        </div>
        <div class="search">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQPcRbaJvhBgd0YgBp_8nLiSylsEjA-79JncguHiPaRBw&s">
            <input type="text" placeholder="Search with google or enter with address" >
        </div>
        <div class="sub">
        <div class="utube">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
            <p>You Tube</p> 
        </div>
        <div class="facebook">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHdxqvC6ycgnQzWZu6i8GgonJZY_5ptmntd3f2txAYuw&s=10">
            <p>Facebook</p>
        </div>
        <div class="instagram">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Instagram_logo_2016.svg/1280px-Instagram_logo_2016.svg.png">
            <p>instagram</p>
        </div>
        </div>
    </div>
    <div class="footer">
        
    </div>
    
</body>
</html>
