<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta Login</title>
    <style>
        *{
            margin:0px;
            padding:0px;
            box-sizing: border-box;
        }
        .main{
            border: 1px solid black;
            height:90vh;
            display:grid;
            grid-template-columns:2fr 1.5fr;
            
        }
        .footer{
            
            height:10vh;
        }
        .left{
            
            display:grid;
            grid-template-columns:0.5fr 2fr;
        }
        .right{
            
        }
        .logo{
           
        }
        .text{
           
        }
        .instalogo img{
            height:70px;
            width:80px;
            margin-top:90px;
            margin-left:80px;
        }
       
        .text h3{
            font-family: "Segoe UI", sans-serif;
            margin:auto;
            
            margin-top:150px;
            font-size:45px;
            
           
        }
         .text img{
            height:50vh;
            width:50vh;
            margin:auto;
            margin-left:50px;
            margin-top:50px;

        }
        span{
            color:rgb(255, 0, 221);
        }
        .form{
            display:flex;
            flex-direction: Column;
            gap:20px;
           
            margin-top: 100px;
            margin-left:40px;
            margin-right:40px;
        }
        .form p{
            font-size: 20px;
        }
        .form input{
            padding:20px;
            border-radius: 10px;
            border-color: gray;
            
        }
        .form button{
            padding:20px;
            border-radius:30px;

        }
        .footer a{
            text-decoration: none;
            text-align: center;
            margin:10px;
        }
        .footer p{
            margin-top:10px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class=" main">
        <div class="left">
            <div class="logo"> 
                <div class="instalogo">
                    <img src="https://e7.pngegg.com/pngimages/454/401/png-clipart-logo-instagram-text-logo-thumbnail.png" alt="instagram logo">
                </div>  
            </div>
            <div class="text">
                <h3>See everyday movements from yours
                    <span>close friends</span></h3>
                <img src="https://static.cdninstagram.com/rsrc.php/yN/r/-erGonz07kB.webp">
            </div>
        </div>
        <div class="right">
            <div class="form">
                <p>Login into Instagram</p>
                <input type="text" placeholder="Mobilenumber,Username or MailID">
                 <input type="password" placeholder="Password">
                  <button style="background-color: rgb(102, 102, 255);">Login</button>
                  <button style="border: none; background-color:white;">Forgot Password</button>
                  <button style="border-color: gray;background-color: white;">Login with Facebook</button>
                  <button style="border-color: blue;color: blue;background-color: white;">Create a new Account</button>
            </div>
        </div>
    </div>
    <div class="footer">
        <nav>
            <a href="">Meta</a>
            <a href="">About</a>
            <a href="">Blog</a>
            <a href="">Jobs</a>
            <a href="">Help</a>
            <a href="">API</a>
            <a href="">Privacy</a>
            <a href="">Terms</a>
            <a href="">Locations</a>
            <a href="">Popular</a>
            <a href="">Instagram Lite</a>
            <a href="">Meta AI</a>
            <a href="">Threads</a>
            <a href="">Contact Uploading & Non-Users</a>
            <a href="">Meta Verified</a>
        </nav>
        <p>@2026 instagram from Meta </p>
    </div>
    
</body>
</html>
